<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAB — 7S Infokarta</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root {
    --bg: #080f08;
    --panel-bg: rgba(8,15,8,0.93);
    --border: #1e3a1e;
    --accent: #2a6b2a;
    --accent-bright: #3dba3d;
    --text: #c8e8c8;
    --text-dim: #5a8a5a;
    --red: #e05050;
    --amber: #d4a017;
    --green: #3dba3d;
    --white: #d0d0d0;
    --black-sym: #888;
    --blue: #4a90d9;
    --camo: #6b7a3a;
    --panel-w: 340px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Courier New', Courier, monospace;
    background: var(--bg); color: var(--text);
    height: 100vh; overflow: hidden;
  }

  #map { position: absolute; inset: 0; z-index: 1; }

  /* TOP BAR */
  #topbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
    display: flex; align-items: center; gap: 12px; padding: 8px 14px;
    background: rgba(8,15,8,0.85); border-bottom: 1px solid var(--border); backdrop-filter: blur(4px);
  }
  #topbar h1 { font-size: 12px; letter-spacing: 4px; color: var(--accent-bright); text-transform: uppercase; flex: 1; }
  #topbar .clock { font-size: 13px; color: var(--text); letter-spacing: 2px; }
  .btn-icon {
    background: none; border: 1px solid var(--border); color: var(--text-dim);
    font-family: inherit; font-size: 11px; padding: 4px 8px; cursor: pointer; letter-spacing: 1px; transition: all .15s;
  }
  .btn-icon:hover, .btn-icon.active { border-color: var(--accent-bright); color: var(--accent-bright); }

  /* SIDE PANEL */
  #panel {
    position: absolute; top: 38px; right: 0; bottom: 0;
    width: var(--panel-w); z-index: 500;
    background: var(--panel-bg); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; transition: transform .25s ease; backdrop-filter: blur(6px);
  }
  #panel.hidden { transform: translateX(var(--panel-w)); }
  #panel-header { padding: 10px 12px 8px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
  #panel-title { font-size: 10px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; }
  #filter-input {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    color: var(--text); font-family: inherit; font-size: 11px;
    padding: 5px 8px; width: 100%; outline: none; letter-spacing: 1px;
  }
  #filter-input:focus { border-color: var(--accent); }
  #filter-input::placeholder { color: var(--text-dim); }
  #report-count { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }
  #report-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  #report-list::-webkit-scrollbar { width: 3px; }
  #report-list::-webkit-scrollbar-thumb { background: var(--border); }

  .report-item {
    padding: 8px 12px; border-bottom: 1px solid rgba(30,58,30,0.4);
    cursor: pointer; transition: background .1s;
    display: flex; gap: 8px; align-items: flex-start; user-select: none;
  }
  .report-item:hover { background: rgba(42,107,42,0.12); }
  .report-item.active { background: rgba(42,107,42,0.22); border-left: 2px solid var(--accent-bright); padding-left: 10px; }
  .report-item.pending { border-left: 2px solid var(--amber); padding-left: 10px; }
  .report-item.active.pending { border-left: 2px solid var(--accent-bright); }
  .report-item.new-incoming { animation: flashNew 1s ease 3; }
  @keyframes flashNew { 0%,100% { background: transparent; } 50% { background: rgba(61,186,61,0.2); } }

  .sym-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
  .report-meta { flex: 1; min-width: 0; }
  .report-top { display: flex; gap: 6px; align-items: baseline; flex-wrap: wrap; }
  .report-stund { font-size: 11px; color: var(--accent-bright); letter-spacing: 1px; white-space: nowrap; }
  .report-slag { font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .report-stalle { font-size: 10px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .report-sagesman { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
  .report-age { font-size: 10px; color: var(--text-dim); white-space: nowrap; flex-shrink: 0; margin-top: 3px; }
  .stale .report-stund, .stale .report-slag, .stale .report-stalle { opacity: 0.45; }
  .pending-badge { font-size: 9px; background: var(--amber); color: #000; padding: 1px 4px; letter-spacing: 1px; }

  /* FLOATING INFO PANELS */
  #panels-host { position: absolute; inset: 0; z-index: 600; pointer-events: none; }
  .info-float {
    position: absolute; width: 260px;
    background: var(--panel-bg); border: 1px solid var(--border); border-top-width: 2px;
    display: flex; flex-direction: column; pointer-events: auto;
    backdrop-filter: blur(8px); box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    max-height: 60vh; overflow: hidden;
  }
  .info-float-header {
    padding: 7px 10px; display: flex; align-items: center; gap: 7px; cursor: move;
  }
  .info-float-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .info-float-title { flex: 1; font-size: 11px; letter-spacing: 2px; color: var(--accent-bright); }
  .info-float-close {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 13px; line-height: 1; padding: 0 3px;
  }
  .info-float-close:hover { color: var(--text); }
  .info-float-photo { width: 100%; height: 130px; object-fit: cover; display: block; cursor: pointer; flex-shrink: 0; }
  .info-float-photo:hover { opacity: 0.85; }
  .info-float-body { padding: 9px 10px; overflow-y: auto; font-size: 10px; line-height: 1.75; flex: 1; }
  .info-float-body::-webkit-scrollbar { width: 3px; }
  .info-float-body::-webkit-scrollbar-thumb { background: var(--border); }
  .info-row { display: flex; gap: 6px; margin-bottom: 1px; }
  .info-label { color: var(--text-dim); width: 80px; flex-shrink: 0; }
  .info-value { color: var(--text); }
  .mgrs-copy { cursor: pointer; }
  .mgrs-copy:hover { color: var(--accent-bright); text-decoration: underline dotted; }

  /* MAP MARKERS */
  .custom-marker { display: flex; align-items: center; justify-content: center; }
  .marker-inner {
    width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    position: relative; cursor: pointer; transition: transform .15s;
  }
  .marker-inner:hover { transform: scale(1.3); }
  .beacon-ring {
    position: absolute; border-radius: 50%; border: 1px solid currentColor;
    top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0); opacity: 0; pointer-events: none;
  }
  .marker-inner.beacon .beacon-ring:nth-child(1) { animation: beaconPulse 2s ease-out infinite; }
  .marker-inner.beacon .beacon-ring:nth-child(2) { animation: beaconPulse 2s ease-out .5s infinite; }
  .marker-inner.beacon .beacon-ring:nth-child(3) { animation: beaconPulse 2s ease-out 1s infinite; }
  @keyframes beaconPulse {
    0%   { transform: translate(-50%,-50%) scale(0); opacity: .8; }
    100% { transform: translate(-50%,-50%) scale(4); opacity: 0; }
  }
  .col-red    { background: var(--red);      color: var(--red); }
  .col-amber  { background: var(--amber);    color: var(--amber); }
  .col-green  { background: var(--green);    color: var(--green); }
  .col-white  { background: var(--white);    color: var(--white); }
  .col-black  { background: var(--black-sym);color: var(--black-sym); }
  .col-blue   { background: var(--blue);     color: var(--blue); }
  .col-camo   { background: var(--camo);     color: var(--camo); }
  .marker-inner.stale { opacity: 0.35; }

  /* SVG ARROWS */
  #arrow-svg {
    position: absolute; inset: 0; width: 100%; height: 100%;
    z-index: 450; pointer-events: none; overflow: visible;
  }
  .arrow-list  { stroke: #3dba3d; stroke-width: 1.5; stroke-dasharray: 6 3; fill: none; opacity: 0.65; }
  .arrow-panel { stroke: #3dba3d; stroke-width: 1;   stroke-dasharray: 3 3; fill: none; opacity: 0.45; }

  /* BOTTOM BAR */
  #bottombar {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
    display: flex; align-items: center; gap: 10px; padding: 6px 12px;
    background: rgba(8,15,8,0.85); border-top: 1px solid var(--border); backdrop-filter: blur(4px);
  }
  #status-text { flex: 1; font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }
  #sel-hint { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; }

  /* LEAFLET */
  .leaflet-control-attribution { display: none !important; }
  .leaflet-control-zoom a { background: var(--panel-bg) !important; color: var(--text) !important; border-color: var(--border) !important; }
  .leaflet-control-zoom a:hover { background: rgba(42,107,42,0.3) !important; }

  @media (max-width: 600px) {
    :root { --panel-w: 100vw; }
    .info-float { width: calc(100vw - 20px); }
  }
</style>
</head>
<body>

<div id="topbar">
  <h1>STAB // 7S INFOKARTA</h1>
  <span class="clock" id="clock">--:--:--</span>
  <button class="btn-icon" id="btn-clean">PANEL</button>
  <button class="btn-icon active" id="btn-sound">LJUD</button>
</div>

<div id="map"></div>

<svg id="arrow-svg">
  <defs>
    <marker id="arrowhead-list" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#3dba3d" opacity="0.8"/>
    </marker>
    <marker id="arrowhead-panel" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#3dba3d" opacity="0.6"/>
    </marker>
  </defs>
  <g id="arrows-group"></g>
</svg>

<div id="panels-host"></div>

<div id="panel">
  <div id="panel-header">
    <div id="panel-title">UNDERRATTELSER</div>
    <input id="filter-input" type="text" placeholder="Filtrera (slag, sagesman, plats)..." autocomplete="off" spellcheck="false"/>
    <div id="report-count">— rapporter</div>
  </div>
  <div id="report-list"></div>
</div>

<div id="bottombar">
  <span id="status-text">SYS OK</span>
  <span id="sel-hint">CTRL+KLICK = MARKERA FLERA</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/mgrs/dist/mgrs.js"></script>
<script>
// ============================================================
// DATA
// ============================================================
const STALE_HOURS = 4;
const H = 3600000;

// Parse DDHHMM → Unix ms timestamp (assumes current or previous month)
function stundToTs(stund) {
  const dd = parseInt(stund.slice(0,2), 10);
  const hh = parseInt(stund.slice(2,4), 10);
  const mm = parseInt(stund.slice(4,6), 10);
  const now = new Date();
  const d = new Date(now.getFullYear(), now.getMonth(), dd, hh, mm, 0, 0);
  if (d.getTime() > Date.now()) d.setMonth(d.getMonth() - 1);
  return d.getTime();
}

const INGEST_API = 'http://localhost:8000';
const POLL_MS    = 10000;

// Konverterar API-svar → internt rapportobjekt
function fromAPI(r) {
  const stund6 = (r.stund || '').slice(0, 6);
  let ts = stundToTs(stund6);
  if (!ts || isNaN(ts)) ts = r.timestamp ? new Date(r.timestamp).getTime() : Date.now();
  return {
    id:             r.id,
    stund:          stund6,
    stunde_s:       r.stund,
    stalle:         r.stalle,
    stallePlain:    r.stalle,
    styrka:         parseInt(r.styrka) || 0,
    slag:           r.slag,
    sysselsattning: r.sysselsattning,
    symbol:         r.symbol,
    sagesman:       r.sagesman,
    sedan:          r.sedan || '',
    pending:        false,
    ts:             ts,
    lat:            r.lat,
    lon:            r.lng,
    anteckningar:   '',
    attachments:    []
  };
}

// ============================================================
// MAP + DAG/NATT
// ============================================================
const map = L.map('map', { center: [59.334, 18.065], zoom: 13, zoomControl: true, preferCanvas: false });

function isDaytime() { const h = new Date().getHours(); return h >= 7 && h < 19; }

let lastDay = isDaytime();
let tileLayer = L.tileLayer(
  lastDay
    ? 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  { maxZoom: 19 }
).addTo(map);

setInterval(() => {
  const day = isDaytime();
  if (day !== lastDay) {
    lastDay = day;
    tileLayer.remove();
    tileLayer = L.tileLayer(
      day
        ? 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
        : 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
      { maxZoom: 19 }
    ).addTo(map);
  }
}, 60000);

// ============================================================
// STATE
// ============================================================
const selectedIds = new Set();
const floatingPanels = {};
let soundOn = true;
let panelVisible = true;
const markerMap = {};
let reports = [...REPORTS];

// ============================================================
// AUDIO
// ============================================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playBlip(freq = 880, dur = 0.08) {
  if (!soundOn) return;
  try {
    ensureAudio();
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = freq; osc.type = 'sine';
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
function playNewReport() {
  if (!soundOn) return;
  [660, 880, 1100].forEach((f, i) => setTimeout(() => playBlip(f, 0.12), i * 100));
}

// ============================================================
// HELPERS
// ============================================================
function symColor(sym) {
  const m = {
    'röd':'col-red','red':'col-red','grön':'col-green','green':'col-green',
    'svart':'col-black','vit':'col-white','gul':'col-amber','blå':'col-blue',
    'kamouflage':'col-camo','kamo':'col-camo'
  };
  return m[(sym||'').toLowerCase()] || 'col-white';
}
function symHex(sym) {
  const m = {
    'col-red':'#e05050','col-green':'#3dba3d','col-black':'#888',
    'col-white':'#d0d0d0','col-amber':'#d4a017','col-blue':'#4a90d9','col-camo':'#6b7a3a'
  };
  return m[symColor(sym)] || '#3dba3d';
}
function isStale(ts) { return (Date.now() - ts) > STALE_HOURS * H; }
function latLonToMGRS(lat, lon) {
  try {
    const raw = mgrs.forward([lon, lat], 5);
    // raw = e.g. "33VXF4523812345" — zone(2-3) + band(1) + 100km(2) + 10 digits
    const m = raw.match(/^(\d{1,2}[A-Z])([A-Z]{2})(\d+)$/);
    if (!m) return raw;
    const half = m[3].length / 2;
    return m[1] + m[2] + ' ' + m[3].slice(0, half) + ' ' + m[3].slice(half);
  } catch(e) { return '—'; }
}
function timeAgo(ts) {
  const diff = Math.floor((Date.now() - ts) / 60000);
  if (diff < 1) return 'just nu';
  if (diff < 60) return diff + ' min';
  const h = Math.floor(diff / 60);
  return h + 'h ' + (diff % 60) + 'min';
}
function matchesFilter(r) {
  const q = document.getElementById('filter-input').value.trim().toLowerCase();
  if (!q) return true;
  return [r.slag, r.sagesman, r.stallePlain, r.stalle, r.sysselsattning, r.symbol]
    .some(v => (v||'').toLowerCase().includes(q));
}

// ============================================================
// PIN SCREEN POSITION
// ============================================================
function pinScreenPos(r) {
  const pt = map.latLngToContainerPoint([r.lat, r.lon]);
  const rect = document.getElementById('map').getBoundingClientRect();
  return { x: rect.left + pt.x, y: rect.top + pt.y };
}

// ============================================================
// MARKERS
// ============================================================
function makeMarkerIcon(r) {
  const col = symColor(r.symbol), sc = isStale(r.ts) ? ' stale' : '';
  return L.divIcon({
    html: `<div class="custom-marker"><div class="marker-inner ${col}${sc}" id="mk-${r.id}"><div class="beacon-ring"></div><div class="beacon-ring"></div><div class="beacon-ring"></div></div></div>`,
    className: '', iconSize: [16,16], iconAnchor: [8,8]
  });
}
function addMarker(r) {
  const m = L.marker([r.lat, r.lon], { icon: makeMarkerIcon(r) }).addTo(map);
  m.on('click', e => selectReport(r.id, e.originalEvent && e.originalEvent.ctrlKey));
  markerMap[r.id] = m;
}
function updateMarkerBeacon(id, active) {
  const el = document.querySelector(`#mk-${id}`);
  if (el) el.classList.toggle('beacon', active);
}

// ============================================================
// RENDER LIST
// ============================================================
function renderList() {
  const list = document.getElementById('report-list');
  const visible = reports.filter(matchesFilter);
  visible.sort((a,b) => b.ts - a.ts);
  document.getElementById('report-count').textContent =
    visible.length + ' rapport' + (visible.length !== 1 ? 'er' : '');
  list.innerHTML = '';
  visible.forEach(r => {
    const div = document.createElement('div');
    const active = selectedIds.has(r.id);
    div.className = 'report-item'
      + (active ? ' active' : '')
      + (r.pending && !active ? ' pending' : '')
      + (isStale(r.ts) ? ' stale' : '');
    div.dataset.id = r.id;
    div.innerHTML = `
      <div class="sym-dot ${symColor(r.symbol)}"></div>
      <div class="report-meta">
        <div class="report-top">
          <span class="report-stund">${r.stund}</span>
          <span class="report-slag">${r.slag}</span>
          ${r.pending ? '<span class="pending-badge">AVVAKTA</span>' : ''}
        </div>
        <div class="report-stalle">${r.stallePlain}</div>
        <div class="report-sagesman">SAGESMAN: ${r.sagesman} &nbsp;|&nbsp; STY: ${r.styrka}</div>
      </div>
      <div class="report-age">${timeAgo(r.ts)}</div>`;
    div.addEventListener('click', e => selectReport(r.id, e.ctrlKey));
    list.appendChild(div);
  });
}

// ============================================================
// FLOATING INFO PANEL
// ============================================================
function infoPanelBodyHTML(r) {
  return `
    <div class="info-row"><span class="info-label">Stund:</span><span class="info-value">${r.stunde_s}</span></div>
    <div class="info-row"><span class="info-label">Ställe:</span><span class="info-value">${r.stallePlain}</span></div>
    <div class="info-row"><span class="info-label">MGRS:</span><span class="info-value mgrs-copy" title="Klicka för att kopiera" data-mgrs="${latLonToMGRS(r.lat, r.lon)}">${latLonToMGRS(r.lat, r.lon)}</span></div>
    <div class="info-row"><span class="info-label">Styrka:</span><span class="info-value">${r.styrka}</span></div>
    <div class="info-row"><span class="info-label">Slag:</span><span class="info-value">${r.slag}</span></div>
    <div class="info-row"><span class="info-label">Syssels.:</span><span class="info-value">${r.sysselsattning}</span></div>
    <div class="info-row"><span class="info-label">Symbol:</span><span class="info-value">${r.symbol}</span></div>
    <div class="info-row"><span class="info-label">Sagesman:</span><span class="info-value">${r.sagesman}</span></div>
    ${r.anteckningar ? `<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border);color:var(--text-dim);font-size:10px;line-height:1.6">${r.anteckningar}</div>` : ''}
    ${r.pending ? `<div style="margin-top:6px;padding:3px 6px;border:1px solid var(--amber);color:var(--amber);font-size:9px;letter-spacing:1px">AVVAKTAR BEKRAFTELSE</div>` : ''}`;
}

function createFloatingPanel(r) {
  const host = document.getElementById('panels-host');
  const el = document.createElement('div');
  el.className = 'info-float';
  el.dataset.id = r.id;
  el.style.borderTopColor = symHex(r.symbol);

  const photoHtml = (r.attachments && r.attachments.length > 0)
    ? `<img class="info-float-photo" src="${r.attachments[0]}" alt="Foto" loading="lazy" onclick="window.open(this.src,'_blank')" title="Klicka för fullstorlek"/>`
    : '';

  el.innerHTML = `
    <div class="info-float-header">
      <div class="info-float-dot ${symColor(r.symbol)}"></div>
      <div class="info-float-title">${r.id} — ${r.slag}</div>
      <button class="info-float-close" data-id="${r.id}">&#x2715;</button>
    </div>
    ${photoHtml}
    <div class="info-float-body">${infoPanelBodyHTML(r)}</div>`;

  el.querySelector('.info-float-close').addEventListener('click', () => deselectReport(r.id));
  el.querySelector('.mgrs-copy').addEventListener('click', function() {
    navigator.clipboard.writeText(this.dataset.mgrs).then(() => {
      const orig = this.textContent;
      this.textContent = 'KOPIERAT';
      this.style.color = 'var(--accent-bright)';
      setTimeout(() => { this.textContent = orig; this.style.color = ''; }, 1200);
    });
  });
  host.appendChild(el);
  floatingPanels[r.id] = el;
  positionPanel(el, r);
  makeDraggable(el, r);
}

function removeFloatingPanel(id) {
  const el = floatingPanels[id];
  if (el) { el.remove(); delete floatingPanels[id]; }
}

// Position panel to the LEFT of pin.
// Top-right corner of panel sits a few px to the left of the pin.
function positionPanel(el, r) {
  const pin = pinScreenPos(r);
  const W = 260, topH = 46, botH = 38;

  // Top-right corner of panel = (pin.x - 4, pin.y - 4)
  let left = pin.x - W - 4;
  let top  = pin.y - 4;

  // If panel would go off left edge, flip to the right
  if (left < 8) left = pin.x + 10;

  // Clamp vertical: don't go off top or bottom
  const elH = el.offsetHeight || 320;
  if (top + elH > window.innerHeight - botH - 8) top = window.innerHeight - botH - elH - 8;
  if (top < topH) top = topH;

  el.style.left = left + 'px';
  el.style.top  = top + 'px';
}

// Push overlapping panels downward
function resolveOverlaps() {
  const PAD = 8;
  const els = Object.values(floatingPanels).filter(e => !e.dataset.dragged);
  els.sort((a, b) => parseFloat(a.style.top) - parseFloat(b.style.top));
  for (let i = 1; i < els.length; i++) {
    const prevBottom = parseFloat(els[i-1].style.top) + els[i-1].offsetHeight;
    const currTop = parseFloat(els[i].style.top);
    if (currTop < prevBottom + PAD) {
      els[i].style.top = (prevBottom + PAD) + 'px';
    }
  }
}

function repositionAllPanels() {
  selectedIds.forEach(id => {
    const r = reports.find(x => x.id === id);
    const el = floatingPanels[id];
    if (r && el && !el.dataset.dragged) positionPanel(el, r);
  });
  resolveOverlaps();
}

// Drag: moves panel, adds panel-to-pin arrow
function makeDraggable(el, r) {
  let ox, oy, mx, my;
  el.querySelector('.info-float-header').addEventListener('mousedown', e => {
    e.preventDefault();
    ox = el.offsetLeft; oy = el.offsetTop; mx = e.clientX; my = e.clientY;
    el.dataset.dragged = '1';
    const onMove = ev => {
      el.style.left = (ox + ev.clientX - mx) + 'px';
      el.style.top  = (oy + ev.clientY - my) + 'px';
      drawAllArrows();
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      drawAllArrows();
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// ============================================================
// AUTO-FIT when multiple selected
// ============================================================
function fitToSelected() {
  if (selectedIds.size < 2) return;
  const latlngs = [...selectedIds].map(id => {
    const r = reports.find(x => x.id === id);
    return r ? [r.lat, r.lon] : null;
  }).filter(Boolean);
  // paddingTopLeft accounts for popup width (~260px) to the left of pins
  // paddingBottomRight accounts for right panel
  map.fitBounds(latlngs, {
    paddingTopLeft:     [280, 60],
    paddingBottomRight: [panelVisible ? 360 : 80, 60],
    maxZoom: 15,
    animate: true
  });
}

// ============================================================
// SELECTION
// ============================================================
function selectReport(id, ctrlKey) {
  if (selectedIds.has(id)) {
    deselectReport(id);
    return;
  }
  if (!ctrlKey) {
    [...selectedIds].forEach(oid => { updateMarkerBeacon(oid, false); removeFloatingPanel(oid); });
    selectedIds.clear();
  }

  selectedIds.add(id);
  updateMarkerBeacon(id, true);
  playBlip(660, 0.06);

  const r = reports.find(x => x.id === id);
  if (!r) return;

  createFloatingPanel(r);
  resolveOverlaps();
  renderList();

  if (selectedIds.size === 1) {
    map.panTo([r.lat, r.lon], { animate: true, duration: 0.4 });
    setTimeout(drawAllArrows, 450);
  } else {
    fitToSelected();
    setTimeout(drawAllArrows, 600);
  }
}

function deselectReport(id) {
  updateMarkerBeacon(id, false);
  removeFloatingPanel(id);
  selectedIds.delete(id);
  renderList();
  if (selectedIds.size > 1) fitToSelected();
  drawAllArrows();
}

// ============================================================
// SVG ARROWS
// Two arrows per selected report:
//   1. list item → pin  (always, if panel visible)
//   2. panel top-right corner → pin  (only after panel has been dragged)
// ============================================================
function drawSVGLine(x1, y1, x2, y2, cssClass, markerId) {
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', x1); line.setAttribute('y1', y1);
  line.setAttribute('x2', x2); line.setAttribute('y2', y2);
  line.setAttribute('class', cssClass);
  line.setAttribute('marker-end', 'url(#' + markerId + ')');
  return line;
}

function drawAllArrows() {
  const g = document.getElementById('arrows-group');
  g.innerHTML = '';

  selectedIds.forEach(id => {
    const r = reports.find(x => x.id === id);
    if (!r) return;

    const pin = pinScreenPos(r);
    const el = floatingPanels[id];

    // Arrow 1: list item → pin (only when side panel is visible)
    if (panelVisible) {
      const listItem = document.querySelector(`.report-item[data-id="${id}"]`);
      if (listItem) {
        const lr = listItem.getBoundingClientRect();
        if (lr.width > 0) {
          g.appendChild(drawSVGLine(lr.left + 2, lr.top + lr.height / 2, pin.x, pin.y, 'arrow-list', 'arrowhead-list'));
        }
      }
    }

    // Arrow 2: panel top-right → pin (only when panel has been dragged)
    if (el && el.dataset.dragged === '1') {
      const pr = el.getBoundingClientRect();
      if (pr.width > 0) {
        g.appendChild(drawSVGLine(pr.right - 2, pr.top + 2, pin.x, pin.y, 'arrow-panel', 'arrowhead-panel'));
      }
    }
  });
}

map.on('move zoom', () => { repositionAllPanels(); drawAllArrows(); });

// ============================================================
// CONTROLS
// ============================================================
document.getElementById('btn-clean').addEventListener('click', () => {
  panelVisible = !panelVisible;
  document.getElementById('panel').classList.toggle('hidden', !panelVisible);
  document.getElementById('btn-clean').classList.toggle('active', panelVisible);
  setTimeout(() => { repositionAllPanels(); drawAllArrows(); }, 300);
});

document.getElementById('btn-sound').addEventListener('click', () => {
  soundOn = !soundOn;
  document.getElementById('btn-sound').classList.toggle('active', soundOn);
  if (soundOn) ensureAudio();
});

function updateMarkerVisibility() {
  reports.forEach(r => {
    const m = markerMap[r.id];
    if (m) m.setOpacity(matchesFilter(r) ? 1 : 0.12);
  });
}

document.getElementById('filter-input').addEventListener('input', () => {
  renderList();
  updateMarkerVisibility();
});

// ============================================================
// CLOCK
// ============================================================
function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent =
    pad(now.getDate()) + pad(now.getHours()) + pad(now.getMinutes()) + 'Z';
}
updateClock();
setInterval(updateClock, 1000);

// ============================================================
// STALE UPDATER
// ============================================================
setInterval(() => {
  renderList();
  reports.forEach(r => {
    const el = document.querySelector(`#mk-${r.id}`);
    if (el) el.classList.toggle('stale', isStale(r.ts));
  });
}, 60000);

// ============================================================
// STATUS
// ============================================================
function setStatus(msg) {
  document.getElementById('status-text').textContent = msg;
  setTimeout(() => {
    document.getElementById('status-text').textContent = 'SYS OK — ' + reports.length + ' RAPPORTER';
  }, 6000);
}

// ============================================================
// LIVE-HÄMTNING FRÅN INGEST.PY
// ============================================================
async function fetchAndSync() {
  let data;
  try {
    const resp = await fetch(`${INGEST_API}/reports`);
    data = await resp.json();
  } catch(e) {
    setStatus('VARNING: ingest.py ej nåbar — starta run_system.bat');
    return;
  }

  const apiReports = (data.reports || []).map(fromAPI);
  const knownIds   = new Set(reports.map(r => r.id));
  let gotNew = false;

  apiReports.forEach(r => {
    if (!knownIds.has(r.id)) {
      reports.push(r);
      addMarker(r);
      gotNew = true;
      setStatus('NY RAPPORT: ' + r.id + ' — ' + r.slag + ' vid ' + r.stallePlain);
      playNewReport();
      setTimeout(() => {
        const el = document.querySelector(`.report-item[data-id="${r.id}"]`);
        if (el) el.classList.add('new-incoming');
      }, 50);
    }
  });

  if (gotNew || reports.length === 0) {
    renderList();
    fitAllMarkers();
  }
}

function fitAllMarkers() {
  const latlngs = reports.map(r => [r.lat, r.lon]);
  if (latlngs.length === 0) {
    map.setView([59.332, 18.065], 13);
    return;
  }
  if (latlngs.length === 1) {
    map.setView(latlngs[0], 14);
    return;
  }
  map.fitBounds(latlngs, {
    paddingTopLeft:     [20, 50],
    paddingBottomRight: [panelVisible ? 360 : 60, 40],
    maxZoom: 14,
    animate: true
  });
}

// ============================================================
// INIT
// ============================================================
renderList();
setStatus('ANSLUTER TILL INGEST.PY...');
fetchAndSync();
setInterval(fetchAndSync, POLL_MS);
</script>
