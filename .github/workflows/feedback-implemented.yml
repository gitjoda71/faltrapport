name: Feedback Implemented

on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.title, 'Feedback')
    steps:
      - name: Comment with implementation notice
        uses: actions/github-script@v7
        with:
          script: |
            const siteUrl = 'https://gitjoda71.github.io/faltrapport/';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `Hej @${context.payload.issue.user.login}!`,
                '',
                'Din feedback har nu implementerats! Tack för att du hjälper oss göra appen bättre.',
                '',
                `Prova den uppdaterade versionen här: ${siteUrl}`,
                '',
                '— Fältrapport-teamet'
              ].join('\n')
            });
