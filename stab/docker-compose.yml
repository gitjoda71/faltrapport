services:

  # Signal-brygga: tar emot Signal-meddelanden och vidarebefordrar som webhook
  signal-cli:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: stabssystem-signal
    ports:
      - "8080:8080"
    volumes:
      - signal-cli-data:/home/.local/share/signal-cli
    environment:
      - MODE=native
      # Skickar varje inkommande Signal-meddelande till ingest.py på värddatorn
      - WEBHOOK_URL=http://host.docker.internal:8000/webhook
    restart: unless-stopped

volumes:
  signal-cli-data:
