name: Welcome Feedback

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.title, 'Feedback')
    steps:
      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `Hej @${context.payload.issue.user.login}!`,
                '',
                'Tack för din feedback! Vi har tagit emot ditt ärende och kommer att titta på det.',
                '',
                'Du får ett nytt meddelande här när din feedback har implementerats.',
                '',
                '— Fältrapport-teamet'
              ].join('\n')
            });
